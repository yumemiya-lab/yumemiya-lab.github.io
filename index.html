<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yumemiya-lab</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f5f7;
    --card-bg: #ffffff;
    --text: #1c1c1e;
    --text-secondary: #6e6e73;
    --border: #e5e5ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card-bg: #1c1c1e;
      --text: #f5f5f7;
      --text-secondary: #98989d;
      --border: #38383a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 48px 20px;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
  }
  h1 {
    font-size: 28px;
    margin: 0 0 8px;
  }
  p.lead {
    color: var(--text-secondary);
    margin: 0 0 40px;
  }
  .apps {
    display: grid;
    gap: 12px;
  }
  a.app-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.15s ease;
  }
  a.app-card:hover {
    transform: translateY(-2px);
  }
  .app-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    flex-shrink: 0;
    display: block;
  }
  .app-icon-placeholder {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    background: linear-gradient(135deg, #2f8f96, #e8845a);
  }
  .app-card .app-name {
    font-size: 17px;
    font-weight: 600;
  }
  .app-card .app-desc {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  h2 {
    font-size: 18px;
    margin: 40px 0 16px;
  }
  .card {
    padding: 20px 24px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
  }
  .card a {
    color: var(--text);
    font-weight: 600;
  }
  p.note {
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.7;
  }
</style>
</head>
<body>
<main>
  <h1>yumemiya-lab</h1>
  <p class="lead">個人開発でリリースしているアプリの一覧です。</p>
  <div class="apps">
    <a class="app-card" href="./tabi-base/">
      <div class="app-icon-placeholder" aria-hidden="true">🧳</div>
      <div>
        <div class="app-name">Tabi Base</div>
        <div class="app-desc">行きたい場所から行程表・マップ・持ち物まで管理できる旅行計画アプリ</div>
      </div>
    </a>
    <a class="app-card" href="./keep/">
      <img class="app-icon" src="./keep/icon-keep.png" alt="keep アイコン">
      <div>
        <div class="app-name">keep</div>
        <div class="app-desc">共有メニューから情報をフォルダ整理して保存</div>
      </div>
    </a>
  </div>

  <h2 id="contact">お問い合わせ</h2>
  <div class="card">
    ご不明な点、不具合のご報告、ご要望などは以下のメールアドレスまでご連絡ください。<br><br>
    <a href="mailto:yumemiya.lab@gmail.com">yumemiya.lab@gmail.com</a>
    <p class="note">お問い合わせの際は、対象のアプリ名と、発生している内容・機種・iOSのバージョンを添えていただけるとスムーズです。</p>
  </div>
</main>
</body>
</html>
