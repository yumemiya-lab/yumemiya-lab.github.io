<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WANT?</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f5f7;
    --card-bg: #ffffff;
    --text: #1c1c1e;
    --text-secondary: #6e6e73;
    --border: #e5e5ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card-bg: #1c1c1e;
      --text: #f5f5f7;
      --text-secondary: #98989d;
      --border: #38383a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 48px 20px;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
  }
  .back {
    display: inline-block;
    margin-bottom: 24px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
  }
  .header-link {
    display: flex;
    text-decoration: none;
    color: inherit;
  }
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }
  header .app-icon {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    flex-shrink: 0;
    display: block;
  }
  h1 {
    font-size: 26px;
    margin: 0;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,159,10,0.15);
    color: #ff9500;
    margin-left: 8px;
    vertical-align: middle;
  }
  p.lead {
    color: var(--text-secondary);
    margin: 16px 0 40px;
  }
  .links {
    display: grid;
    gap: 12px;
  }
  a.link-card {
    display: block;
    padding: 16px 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-decoration: none;
    color: var(--text);
    font-size: 16px;
    font-weight: 500;
  }
</style>
</head>
<body>
<main>
  <a class="back" href="../">← yumemiya-lab</a>
  <header>
    <img class="app-icon" src="./icon-want.png" alt="WANT? アイコン">
    <h1>WANT?<span class="badge">リリース予定</span></h1>
  </header>
  <p class="lead">商品ページを共有すると「欲しい」気持ちを24時間だけ預かり、翌日に保存時の理由や商品情報を見直しながら「購入する」「さらに待つ」「見送る」を冷静に判断できる買い物サポートアプリです。</p>
  <div class="links">
    <a class="link-card" href="./faq.html">よくある質問</a>
    <a class="link-card" href="./privacy.html">プライバシーポリシー</a>
    <a class="link-card" href="../#contact">お問い合わせ</a>
  </div>
</main>
</body>
</html>
